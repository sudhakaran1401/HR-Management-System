<!-- Reusable Table Controls -->
<div class="table-controls d-flex justify-content-start align-items-center mx-3 flex-wrap gap-1">

    <!-- LEFT: Rows per page -->
    <div class="d-flex align-items-center gap-2">
        <label class="mb-0 fw-semibold text-muted">Rows:</label>

        <select id="{{ table_id }}_rowsPerPage"
                class="form-select form-select-sm">
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50">50</option>
        </select>
    </div>

    <!-- CENTER: Page info -->
    <div class="text-center flex-grow-1">
        <small class="text-muted fw-semibold" id="{{ table_id }}_pageInfo"></small>
    </div>

    <!-- RIGHT: Controls -->
    <div class="d-flex align-items-center gap-2">

        <button id="{{ table_id }}_prev"
                class="btn btn-primary">
            ← Prev
        </button>

        <button id="{{ table_id }}_next"
                class="btn btn-primary">
            Next →
        </button>

    </div>

</div>
